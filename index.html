<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LS AI - Chat com Inteligência Artificial</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><defs><linearGradient id='g' x1='0%' y1='0%' x2='100%' y2='100%'><stop offset='0%' stop-color='%2300d4ff'/><stop offset='100%' stop-color='%238b5cf6'/></linearGradient></defs><circle cx='50' cy='50' r='40' fill='url(%23g)' stroke='white' stroke-width='3' opacity='0.9'/><text x='50' y='55' font-family='Inter,sans-serif' font-size='24' font-weight='700' text-anchor='middle' fill='white'>LS</text></svg>">
    <link rel="stylesheet" href="style.css">
</head>
<body class="theme-dark">
    <!-- Loading Screen -->
    <div id="loadingScreen" class="loading-screen position-fixed w-100 h-100 d-flex flex-column justify-content-center align-items-center top-0 start-0 z-5">
        <div class="loading-container text-center">
            <div class="logo-spin mb-4">
                <svg viewBox="0 0 120 40" width="120" height="40" class="logo-svg">
                    <defs>
                        <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stop-color="#00d4ff">
                                <animate attributeName="stop-color" values="#00d4ff;#8b5cf6;#00d4ff" dur="2s" repeatCount="indefinite"/>
                            </stop>
                            <stop offset="100%" stop-color="#8b5cf6">
                                <animate attributeName="stop-color" values="#8b5cf6;#00d4ff;#8b5cf6" dur="2s" repeatCount="indefinite"/>
                            </stop>
                        </linearGradient>
                    </defs>
                    <text x="8" y="28" font-family="'Inter', sans-serif" font-size="26" font-weight="700" fill="url(#logoGrad)">LS</text>
                    <text x="42" y="28" font-family="'Inter', sans-serif" font-size="14" font-weight="600" fill="#a1a1aa">AI</text>
                </svg>
            </div>
            <div class="loading-progress mb-3">
                <div class="progress-bar-container">
                    <div class="progress-bar-fill"></div>
                </div>
            </div>
            <div class="loading-text">
                <span>Inicializando IA</span>
            </div>
        </div>
    </div>

    <!-- App Container -->
    <div id="mainApp" class="app-container d-flex min-vh-100">
        <!-- Sidebar -->
        <div class="sidebar" id="sidebar">
            <div class="sidebar-header p-4 border-bottom">
                <div class="d-flex align-items-center mb-3">
                    <div class="logo-small me-2">
                        <svg viewBox="0 0 32 32" width="32" height="32">
                            <circle cx="16" cy="16" r="12" fill="url(#smallGrad)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
                            <text x="16" y="20" font-family="'Inter',sans-serif" font-size="12" font-weight="700" text-anchor="middle" fill="white">LS</text>
                            <defs>
                                <linearGradient id="smallGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                                    <stop offset="0%" stop-color="#00d4ff"/>
                                    <stop offset="100%" stop-color="#8b5cf6"/>
                                </linearGradient>
                            </defs>
                        </svg>
                    </div>
                    <div>
                        <h6 class="mb-0 fw-bold">LS AI</h6>
                        <small class="text-muted">Assistente IA</small>
                    </div>
                </div>
                <div class="api-key-section">
                    <div class="input-group input-group-sm">
                        <input type="password" class="form-control form-control-sm" id="apiKeyInput" placeholder="API Key (Aqui!)">
                        <button class="btn btn-outline-light btn-sm" id="saveApiKey">
                            <i class="bi bi-check-lg"></i>
                        </button>
                    </div>
                    <small class="text-muted mt-1 d-block">Groq / Gemini / HF</small>
                </div>
            </div>
            <div class="sidebar-body p-2">
                <div class="new-chat-btn mb-3">
                    <button class="btn btn-light w-100 fw-semibold" id="newChatBtn">
                        <i class="bi bi-plus-circle me-2"></i>Novo Chat
                    </button>
                </div>
                <div class="chat-list" id="chatList">
                    <!-- Chat items will be populated by JS -->
                </div>
            </div>
        </div>

        <!-- Main Chat Area -->
        <div class="chat-container flex-grow-1 d-flex flex-column">
            <!-- Navbar -->
            <div class="chat-navbar border-bottom p-3">
                <div class="d-flex align-items-center justify-content-between">
                    <div class="d-flex align-items-center">
                        <button class="btn btn-link p-0 me-3 d-lg-none" id="toggleSidebar">
                            <i class="bi bi-list fs-4"></i>
                        </button>
                        <div class="chat-title" id="chatTitle">Bem-vindo ao LS AI</div>
                    </div>
                    <div class="d-flex align-items-center gap-2">
                        <button class="btn btn-sm btn-outline-secondary" id="themeToggle">
                            <i class="bi bi-moon-stars-fill"></i>
                        </button>
                        <div class="user-profile ms-2" id="userProfile" style="display: none;">
                            <img id="userAvatar" class="rounded-circle" width="32" height="32" alt="User">
                            <span id="userName" class="ms-2 fw-semibold"></span>
                        </div>
                        <button class="btn btn-sm btn-outline-danger ms-2" id="logoutBtn" style="display: none;">
                            <i class="bi bi-box-arrow-right"></i>
                        </button>
                    </div>
                </div>
            </div>

            <!-- Messages Area -->
            <div class="messages-container flex-grow-1 p-4 overflow-auto" id="messagesContainer">
                <div class="welcome-message text-center py-5">
                    <i class="bi bi-chat-dots display-1 text-muted mb-3"></i>
                    <h4 class="text-muted mb-2">Comece uma conversa</h4>
                    <p class="text-muted mb-0">Envie uma mensagem para começar a conversar com a IA</p>
                </div>
            </div>

            <!-- Input Area -->
            <div class="chat-input-container p-3 border-top">
                <div class="input-group">
                    <textarea class="form-control" id="messageInput" rows="1" placeholder="Digite sua mensagem..."></textarea>
                    <button class="btn btn-primary" id="sendBtn">
                        <i class="bi bi-send-fill"></i>
                    </button>
                </div>
                <div class="typing-indicator mt-2" id="typingIndicator" style="display: none;">
                    <div class="typing-dots">
                        <span></span><span></span><span></span>
                    </div>
                    <small class="text-muted ms-2">LS AI está digitando...</small>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast Container -->
    <div class="toast-container position-fixed bottom-0 end-0 p-3 z-4">
        <div id="mainToast" class="toast" role="alert">
            <div class="toast-header">
                <i class="bi bi-check-circle-fill text-success me-2"></i>
                <strong class="me-auto" id="toastTitle">Sucesso</strong>
                <button type="button" class="btn-close" data-bs-dismiss="toast"></button>
            </div>
            <div class="toast-body" id="toastBody"></div>
        </div>
    </div>

    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.13.1/firebase-app.js';
        import { getAuth, GoogleAuthProvider, signInWithPopup, signOut } from 'https://www.gstatic.com/firebasejs/10.13.1/firebase-auth.js';
        import { getFirestore, collection, addDoc, getDocs, query, where, orderBy, onSnapshot, doc, deleteDoc, updateDoc } from 'https://www.gstatic.com/firebasejs/10.13.1/firebase-firestore.js';
        
        window.firebase = {
            app: initializeApp({
                // SUBSTITUA pelos seus dados do Firebase Console
                apiKey: "AIzaSyXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX",
                authDomain: "seu-projeto.firebaseapp.com",
                projectId: "seu-projeto",
                storageBucket: "seu-projeto.appspot.com",
                messagingSenderId: "123456789",
                appId: "1:123456789:web:abcdef123456"
            }),
            auth: getAuth(),
            provider: new GoogleAuthProvider(),
            db: getFirestore()
        };
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
