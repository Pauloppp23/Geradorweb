<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DataForge Pro - Gerador Profissional</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="dark-theme">
    <div class="container-fluid py-4">
        <!-- Header -->
        <div class="row mb-5">
            <div class="col-12 text-center">
                <div class="logo mb-3">
                    <svg viewBox="0 0 120 40" class="mb-3">
                        <text x="10" y="28" font-family="Inter, sans-serif" font-size="24" font-weight="700" fill="currentColor">Data</text>
                        <text x="65" y="28" font-family="Inter, sans-serif" font-size="24" font-weight="700" fill="#00d4aa">Forge</text>
                        <text x="115" y="28" font-size="14" fill="currentColor">Pro</text>
                    </svg>
                </div>
                <h1 class="display-5 fw-bold mb-2">DataForge Pro</h1>
                <p class="lead text-muted">Gerador profissional de dados seguros</p>
            </div>
        </div>

        <div class="row g-4">
            <!-- Gerador CPF -->
            <div class="col-lg-3 col-md-6">
                <div class="card glass-card h-100">
                    <div class="card-body">
                        <h5 class="card-title"><i class="bi bi-credit-card me-2"></i>CPF Válido</h5>
                        <div id="cpfResult" class="result-box mb-3">000.000.000-00</div>
                        <button class="btn btn-outline-light btn-sm w-100" data-copy="cpfResult">
                            <i class="bi bi-copy me-1"></i>Copiar
                        </button>
                    </div>
                </div>
            </div>

            <!-- Gerador Senha -->
            <div class="col-lg-3 col-md-6">
                <div class="card glass-card h-100">
                    <div class="card-body">
                        <h5 class="card-title"><i class="bi bi-lock-fill me-2"></i>Senha Ultra</h5>
                        <div class="mb-2">
                            <label class="form-label small">Tamanho:</label>
                            <input type="range" class="form-range" id="passwordLength" min="16" max="64" value="32">
                            <small id="passwordStrength" class="text-success">🔒 128+ bits</small>
                        </div>
                        <label class="form-check-label small">
                            <input type="checkbox" class="form-check-input me-1" id="includeSpecial" checked> Símbolos
                        </label>
                        <div id="passwordResult" class="result-box mt-2 mb-3">SuaSenhaUltraSegura123!</div>
                        <button class="btn btn-outline-light btn-sm w-100" data-copy="passwordResult">
                            <i class="bi bi-copy me-1"></i>Copiar
                        </button>
                    </div>
                </div>
            </div>

            <!-- Gerador Nome -->
            <div class="col-lg-3 col-md-6">
                <div class="card glass-card h-100">
                    <div class="card-body">
                        <h5 class="card-title"><i class="bi bi-person me-2"></i>Nome BR</h5>
                        <div id="nameResult" class="result-box mb-3">João Silva</div>
                        <button class="btn btn-outline-light btn-sm w-100" data-copy="nameResult">
                            <i class="bi bi-copy me-1"></i>Copiar
                        </button>
                    </div>
                </div>
            </div>

            <!-- Gerador Username -->
            <div class="col-lg-3 col-md-6">
                <div class="card glass-card h-100">
                    <div class="card-body">
                        <h5 class="card-title"><i class="bi bi-controller me-2"></i>Username</h5>
                        <div id="usernameResult" class="result-box mb-3">xXFireKing_12345</div>
                        <button class="btn btn-outline-light btn-sm w-100" data-copy="usernameResult">
                            <i class="bi bi-copy me-1"></i>Copiar
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Controles -->
        <div class="row mt-4">
            <div class="col-md-6">
                <button id="generateBtn" class="btn btn-primary btn-lg w-100">
                    <i class="bi bi-lightning-charge me-2"></i>🔥 Gerar Tudo
                </button>
            </div>
            <div class="col-md-3">
                <button id="copyAllBtn" class="btn btn-outline-light btn-lg w-100">
                    <i class="bi bi-files me-2"></i>Copiar Tudo
                </button>
            </div>
            <div class="col-md-3">
                <div class="d-flex gap-2">
                    <div class="form-check form-switch">
                        <input class="form-check-input" type="checkbox" id="themeToggle">
                        <label class="form-check-label text-light" for="themeToggle">
                            <i class="bi bi-moon-stars-fill"></i>
                        </label>
                    </div>
                </div>
            </div>
        </div>

        <!-- Histórico -->
        <div class="row mt-5">
            <div class="col-12">
                <div class="card glass-card">
                    <div class="card-body">
                        <div class="d-flex justify-content-between align-items-center mb-3">
                            <h5 class="card-title mb-0"><i class="bi bi-clock-history me-2"></i>Histórico</h5>
                            <button id="clearHistoryBtn" class="btn btn-sm btn-outline-light">
                                <i class="bi bi-trash"></i> Limpar
                            </button>
                        </div>
                        <div id="historyList" class="history-container"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="toast position-fixed bottom-0 end-0 m-4 bg-success text-white shadow-lg"></div>

    <script src="script.js"></script>
</body>
</html>
